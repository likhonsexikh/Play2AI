version: '3.8'

services:
  emulator:
    image: waydroid/waydroid:latest
    privileged: true
    devices:
      - /dev/kvm
      - /dev/binder
    environment:
      - ANDROID_DISPLAY=:0
    volumes:
      - ./android-data:/data
    ports:
      - "5555:5555"
    # If using GPU passthrough or special hardware, add below
    # devices:
    #   - /dev/dri/card0

  agent:
    build: ./agent
    depends_on:
      - emulator
    volumes:
      - ./todo.md:/app/todo.md
      - ./output:/app/output
    environment:
      - ADB_SERVER_SOCKET=tcp:emulator:5555
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL=your_model_here
    # optional ports if exposing UI/endpoint
    ports:
      - "5000:5000"
