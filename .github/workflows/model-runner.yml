name: Model Runner

on:
  push:
    paths:
      - 'todo.md'
      - 'agent/**'
      - '.github/workflows/model-runner.yml'

jobs:
  run-tasks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and start services
        run: docker-compose up --build -d

      - name: Wait for emulator to be ready
        run: |
          # simple polling, adjust as needed
          until docker exec $(docker-compose ps -q emulator) adb devices; do
            sleep 5
          done

      - name: Run agent tasks
        run: docker exec $(docker-compose ps -q agent) python /app/src/main.py --todo /app/todo.md

      - name: Collect artifacts
        run: |
          docker cp $(docker-compose ps -q agent):/app/logs logs || true
          docker cp $(docker-compose ps -q emulator):/data/screenshots screenshots || true
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: run-results
          path: |
            logs
            screenshots

      - name: Shut down
        run: docker-compose down
