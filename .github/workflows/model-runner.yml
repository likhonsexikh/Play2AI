name: Model Runner

on:
  push:
    paths:
      - 'todo.md'
      - 'agent/**'
      - '.github/workflows/model-runner.yml'

jobs:
  run-tasks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and start services
        run: docker-compose up --build -d

      - name: Wait for emulator to be ready
        run: |
          # simple polling, adjust as needed
          until docker-compose exec agent adb devices; do
            sleep 5
          done

      - name: Run agent tasks
        run: docker-compose exec agent python /app/src/main.py --todo /app/todo.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: run-results
          path: output/
          if-no-files-found: warn

      - name: Shut down
        run: docker-compose down
